<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Calculator | Vani Projects</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

        body {
            background: linear-gradient(135deg, #ff4d6d, #833ab4);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .back-link {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            text-decoration: none;
            font-weight: 600;
            background: rgba(255, 255, 255, 0.2);
            padding: 8px 15px;
            border-radius: 20px;
            backdrop-filter: blur(5px);
            transition: 0.3s;
        }

        .back-link:hover { background: white; color: #ff4d6d; }

        /* Calculator Container */
        .calculator {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 25px;
            border-radius: 30px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
            width: 320px;
        }

        /* Screen Display */
        .display {
            width: 100%;
            height: 80px;
            background: rgba(255, 255, 255, 0.05);
            border: none;
            border-radius: 15px;
            margin-bottom: 20px;
            text-align: right;
            padding: 20px;
            font-size: 2rem;
            color: white;
            outline: none;
        }

        /* Buttons Grid */
        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        button {
            height: 60px;
            width: 60px;
            border-radius: 50%;
            border: none;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 1.2rem;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover { background: rgba(255, 255, 255, 0.3); transform: scale(1.05); }

        /* Functional Button Colors */
        .operator { background: rgba(255, 255, 255, 0.2); color: #ffeb3b; }
        .equal { 
            background: #ff4d6d; 
            grid-column: span 2; 
            width: 100%; 
            border-radius: 30px; 
            font-weight: 600; 
        }
        .clear { color: #ff8fa3; }

    </style>
</head>
<body>

<a href="index.html" class="back-link">← Portfolio</a>

<div class="calculator">
    <input type="text" class="display" id="screen" readonly placeholder="0">

    <div class="buttons">
        <button class="clear" onclick="clearScreen()">AC</button>
        <button class="operator" onclick="deleteLast()">DEL</button>
        <button class="operator" onclick="addToScreen('%')">%</button>
        <button class="operator" onclick="addToScreen('/')">÷</button>

        <button onclick="addToScreen('7')">7</button>
        <button onclick="addToScreen('8')">8</button>
        <button onclick="addToScreen('9')">9</button>
        <button class="operator" onclick="addToScreen('*')">×</button>

        <button onclick="addToScreen('4')">4</button>
        <button onclick="addToScreen('5')">5</button>
        <button onclick="addToScreen('6')">6</button>
        <button class="operator" onclick="addToScreen('-')">-</button>

        <button onclick="addToScreen('1')">1</button>
        <button onclick="addToScreen('2')">2</button>
        <button onclick="addToScreen('3')">3</button>
        <button class="operator" onclick="addToScreen('+')">+</button>

        <button onclick="addToScreen('0')">0</button>
        <button onclick="addToScreen('.')">.</button>
        <button class="equal" onclick="calculate()">=</button>
    </div>
</div>

<script>
    let display = document.getElementById('screen');

    // Add character to screen
    function addToScreen(value) {
        if (display.value === "Error") clearScreen();
        display.value += value;
    }

    // Clear screen
    function clearScreen() {
        display.value = "";
    }

    // Delete last character
    function deleteLast() {
        display.value = display.value.slice(0, -1);
    }

    // Advanced Calculation logic
    function calculate() {
        try {
            // Using eval() carefully for basic arithmetic
            // We replace % with /100 for percentage logic
            let expression = display.value.replace('%', '/100');
            
            if (expression === "") return;
            
            let result = eval(expression);
            
            // Format to avoid long decimals (e.g., 0.1 + 0.2)
            display.value = Number(result.toFixed(8)); 
        } catch (err) {
            display.value = "Error";
        }
    }
</script>

</body>
</html>
